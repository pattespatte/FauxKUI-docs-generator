# Sveltia CMS Configuration for FauxKUI Documentation
# GitHub backend for remote editing on GitHub Pages

backend:
  name: github
  repo: pattespatte/FauxKUI-docs-generator
  branch: main
  auth_scope: repo
  client_id: Ov23li1lMwz33Z2ZUsyq

# Prevent Netlify Identity fallback on GitHub Pages
netlify_identity_enabled: false

media_folder: "public/images"
public_folder: "/images"

collections:
  # Documentation pages
  - name: "docs"
    label: "Documentation"
    label_singular: "Page"
    folder: "docs"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "article"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Title", name: "short-title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Produktionsklar", "Beta", "Deprecated"], default: "Produktionsklar"}
      - {label: "Body", name: "body", widget: "markdown"}

  # Component pages - individual collections for nested folders
  - name: "components-knapp"
    label: "Knapp"
    label_singular: "Komponent"
    folder: "src/components/knapp"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "component"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Title", name: "short-title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Produktionsklar", "Beta", "Deprecated"], default: "Produktionsklar"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "components-kort"
    label: "Kort"
    label_singular: "Komponent"
    folder: "src/components/kort"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "component"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Title", name: "short-title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Produktionsklar", "Beta", "Deprecated"], default: "Produktionsklar"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "components-modal"
    label: "Modal"
    label_singular: "Komponent"
    folder: "src/components/modal"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "component"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Title", name: "short-title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Produktionsklar", "Beta", "Deprecated"], default: "Produktionsklar"}
      - {label: "Body", name: "body", widget: "markdown"}

  # Component index page
  - name: "components-index"
    label: "Komponenter"
    label_singular: "Sida"
    files:
      - file: "src/components/index.md"
        name: "index"
        label: "Komponenter"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "component"}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Short Title", name: "short-title", widget: "string"}
          - {label: "Status", name: "status", widget: "select", options: ["Produktionsklar", "Beta", "Deprecated"], default: "Produktionsklar"}
          - {label: "Body", name: "body", widget: "markdown"}

editor:
  preview: false
