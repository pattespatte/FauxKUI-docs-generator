# Sveltia CMS Configuration for FauxKUI Documentation
# GitHub backend for remote editing on GitHub Pages

backend:
  name: github
  repo: pattespatte/FauxKUI-docs-generator
  branch: main
  auth_scope: repo
  client_id: Ov23li1lMwz33Z2ZUsyq

# Prevent Netlify Identity fallback on GitHub Pages
netlify_identity_enabled: false

media_folder: "public/images"
public_folder: "/images"

collections:
  # Documentation pages
  - name: "docs"
    label: "Documentation"
    label_singular: "Page"
    folder: "docs"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}

  # Component pages
  - name: "components"
    label: "Komponenter"
    label_singular: "Component"
    folder: "src/components"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "component"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Short Title", name: "short-title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Produktionsklar", "Beta", "Deprecated"], default: "Produktionsklar"}
      - {label: "Body", name: "body", widget: "markdown"}

editor:
  preview: false
