# Netlify deployment configuration for FauxKUI Documentation

[build]
  publish = "docs/build"
  command = "npm run docs:build && cp -r admin docs/build/"

[build.environment]
  NODE_VERSION = "20"

# Admin route - must come first (exclude from SPA redirect)
[[redirects]]
  from = "/admin/index.html"
  to = "/admin/index.html"
  status = 200
  force = false

# SPA redirect for documentation (exclude /admin/)
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# All other routes go to SPA index
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
